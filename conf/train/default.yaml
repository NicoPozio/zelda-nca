# Iperparametri del training dell'NCA.

lr: 1.0e-3            # learning rate di Adam
steps: 8000           # da calibrare con la smoke run, non e' un valore del paper
batch_size: 8         # confermato dal paper Growing NCA
pool_size: 1024       # confermato dal paper

# BPTT: srotolamento di lunghezza variabile in [bptt_min, bptt_max].
bptt_min: 64          # confermato dal paper
bptt_max: 96          # confermato dal paper

grad_clip: 1.0        # clip della norma del gradiente contro l'exploding

# Danno stocastico applicato in training (mai i danni mirati).
damage_prob: 0.5
damage_fractions: [0.2, 0.4, 0.6]

log_every: 100        # ogni quanti step stampare la loss
checkpoint_every: 1000
smoke_steps: 0        # se > 0 sovrascrive 'steps' per misurare il tempo/step

aux_weight: 0.0       # lambda del task topologico ausiliario; 0 = solo ricostruzione